name: Probe DB Password

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - working-directory: scripts
        run: npm ci || npm install
      - working-directory: scripts
        run: node probe-password.mjs
