name: Build and Deploy

on:
  push:
    branches:
      - main
      - 'claude/**'   # claude 작업 브랜치도 자동 배포
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ================================================================
  # 1) Supabase 마이그레이션 (항상 실행, _migrations 트래킹으로 idempotent)
  # ================================================================
  migrate:
    name: Apply Supabase migrations
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for posting commit comments
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install scripts dependencies
        working-directory: scripts
        run: npm ci || npm install

      - name: Apply migrations (Management API)
        working-directory: scripts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: node mgmt-migrate.mjs

      - name: Verify (best-effort, may fail without DB password)
        working-directory: scripts
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        continue-on-error: true
        run: node verify.mjs

  # ================================================================
  # 1.5) Edge Function 'notify' 배포 (선택적 — SUPABASE_ACCESS_TOKEN 필요)
  # ================================================================
  deploy-functions:
    name: Deploy Supabase Edge Functions
    runs-on: ubuntu-latest
    needs: migrate
    # SUPABASE_ACCESS_TOKEN secret 있을 때만 실행
    if: ${{ needs.migrate.result == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if Supabase token configured
        id: gate
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "SUPABASE_ACCESS_TOKEN secret 미설정 — skip"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - uses: supabase/setup-cli@v1
        if: steps.gate.outputs.configured == 'true'
        with:
          version: latest

      - name: Deploy Edge Functions
        if: steps.gate.outputs.configured == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PROJECT_REF=$(echo "${{ secrets.SUPABASE_URL }}" | sed -E 's|https?://([^.]+)\..*|\1|')
          supabase functions deploy notify --project-ref "$PROJECT_REF"
          supabase functions deploy due-reminder --project-ref "$PROJECT_REF"
          supabase functions deploy transcribe-meeting --project-ref "$PROJECT_REF"
          supabase functions deploy cleanup-meeting --project-ref "$PROJECT_REF"
          supabase functions deploy cleanup-memo --project-ref "$PROJECT_REF"

      - name: Set Edge Function secrets
        if: steps.gate.outputs.configured == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PROJECT_REF=$(echo "${{ secrets.SUPABASE_URL }}" | sed -E 's|https?://([^.]+)\..*|\1|')
          # Firebase 관련은 항상 설정
          supabase secrets set --project-ref "$PROJECT_REF" \
            FIREBASE_PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID }}" \
            FIREBASE_SERVICE_ACCOUNT='${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          # OPENAI_API_KEY (선택, 옛 Whisper 경로용)
          if [ -n "${{ secrets.OPENAI_API_KEY }}" ]; then
            supabase secrets set --project-ref "$PROJECT_REF" \
              OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
          fi
          # GEMINI_API_KEY (회의록 AI 정리용, 무료 권장)
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
            supabase secrets set --project-ref "$PROJECT_REF" \
              GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
          fi

  # ================================================================
  # 2) Flutter Web 빌드 + Firebase Hosting 배포
  # ================================================================
  build-and-deploy:
    name: Build Flutter Web and deploy to Firebase Hosting
    runs-on: ubuntu-latest
    needs: migrate
    permissions:
      contents: write   # ci-logs 브랜치 생성 + 로그 커밋용
    # 마이그레이션 결과 무관하게 항상 빌드 (이미 적용된 DB 에 대해 새 클라 배포 가능하도록)
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable

      - name: Inject Firebase config into firebase-messaging-sw.js
        run: |
          sed -i \
            -e "s|__FIREBASE_API_KEY__|${{ secrets.FIREBASE_API_KEY }}|g" \
            -e "s|__FIREBASE_AUTH_DOMAIN__|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g" \
            -e "s|__FIREBASE_PROJECT_ID__|${{ secrets.FIREBASE_PROJECT_ID }}|g" \
            -e "s|__FIREBASE_STORAGE_BUCKET__|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g" \
            -e "s|__FIREBASE_MESSAGING_SENDER_ID__|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g" \
            -e "s|__FIREBASE_APP_ID__|${{ secrets.FIREBASE_APP_ID }}|g" \
            web/firebase-messaging-sw.js

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: |
          set +e
          flutter analyze 2>&1 | tee /tmp/analyze.log
          rc=${PIPESTATUS[0]}
          # Always copy log to working dir so artifact upload works
          mkdir -p /tmp/build-logs
          cp /tmp/analyze.log /tmp/build-logs/
          exit $rc
        continue-on-error: true

      - name: Download Pretendard fonts (Regular + Bold only for bundle size)
        run: |
          mkdir -p assets/fonts
          BASE=https://github.com/orioncactus/pretendard/raw/v1.3.9/packages/pretendard/dist/public/static
          curl -fsSL "$BASE/Pretendard-Regular.otf" -o assets/fonts/Pretendard-Regular.otf
          curl -fsSL "$BASE/Pretendard-Bold.otf"    -o assets/fonts/Pretendard-Bold.otf
          ls -la assets/fonts/

      - name: Build Web (CanvasKit + bundled Pretendard)
        run: |
          set +e
          flutter build web --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }} \
            --dart-define=FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }} \
            --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }} \
            --dart-define=FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }} \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }} \
            --dart-define=FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }} \
            --dart-define=FIREBASE_VAPID_PUBLIC_KEY=${{ secrets.FIREBASE_VAPID_PUBLIC_KEY }} \
            2>&1 | tee /tmp/build.log
          rc=${PIPESTATUS[0]}
          mkdir -p /tmp/build-logs
          cp /tmp/build.log /tmp/build-logs/ || true
          exit $rc

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/build-logs/
          retention-days: 3

      - name: Push error log to ci-logs/ on failure (readable via API)
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          ls -la /tmp/build-logs/ 2>&1 || true
          LOG=""
          if [ -f /tmp/build-logs/build.log ] && [ -s /tmp/build-logs/build.log ]; then LOG=/tmp/build-logs/build.log; fi
          if [ -z "$LOG" ] && [ -f /tmp/build-logs/analyze.log ]; then LOG=/tmp/build-logs/analyze.log; fi
          if [ -z "$LOG" ]; then echo "no log file"; exit 0; fi
          export LOG_FILE="$LOG"
          python3 ${{ github.workspace }}/scripts/commit-log-to-branch.py

      - name: Copy firebase-messaging-sw.js to build output
        run: cp web/firebase-messaging-sw.js build/web/firebase-messaging-sw.js

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: live
