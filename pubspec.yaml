name: nationalgym_tasks
description: "내셔널짐 PT 업무공유 PWA"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Backend / 인증
  supabase_flutter: ^2.8.0

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.6.0

  # Firebase / FCM (Web Push)
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5

  # Utilities
  intl: ^0.19.0          # 날짜 포맷
  collection: ^1.18.0    # 컬렉션 헬퍼
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # 회의록 음성 인식 (Web Speech API, 무료, 가입 불필요)
  speech_to_text: ^7.0.0
  # 고품질 녹음 (MediaRecorder + AGC + noise suppression, 모든 브라우저)
  record: ^5.1.2
  http: ^1.2.2

  # 파일 첨부 (사진·동영상·PDF·엑셀·워드 등)
  file_picker: ^8.1.4
  mime: ^2.0.0
  url_launcher: ^6.3.1

  # 로그인 편의 (ID 기억 / 자동 로그인 / 생체인식)
  shared_preferences: ^2.3.3        # username + 체크박스 상태
  flutter_secure_storage: ^9.2.2    # 암호화 storage (password)
  local_auth: ^2.3.0                # 지문 / Face ID (네이티브). 웹에선 fallback

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand_logo.png

  # Pretendard — 한국어 우선 본문체. CanvasKit 이 한글 글리프 그릴 수 있도록 번들.
  # Regular + Bold 만 (Medium / Black 은 번들 크기 절약 위해 제외).
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
