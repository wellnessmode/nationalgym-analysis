name: nationalgym_tasks
description: "내셔널짐 PT 업무공유 PWA"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Backend / 인증
  supabase_flutter: ^2.8.0

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.6.0

  # Firebase / FCM (Web Push)
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5

  # Utilities
  intl: ^0.19.0          # 날짜 포맷
  collection: ^1.18.0    # 컬렉션 헬퍼
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # 회의록 음성 인식 (Web Speech API, 무료, 가입 불필요)
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand_logo.png
