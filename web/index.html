<!DOCTYPE html>
<html lang="ko">
<head>
  <!--
    base href는 빌드 시 Flutter가 치환. 이 줄 유지 필수.
    상대 경로(manifest.json, icons/) 모두 이 base 기준.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="내셔널짐 PT 지점 업무·회의록 공유">

  <!-- ===========================================
       PWA 공통
       =========================================== -->
  <meta name="theme-color" content="#0a1628">
  <link rel="manifest" href="manifest.json">

  <!-- ===========================================
       iOS 전용 (Safari 16.4+ 웹푸시 요구사항)
       반드시 "홈 화면에 추가"로 설치된 standalone 상태에서만 푸시 동작
       =========================================== -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NG업무">

  <!-- iOS 홈 화면 아이콘 (큰 사이즈가 우선됨) -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/apple-touch-icon-167.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/apple-touch-icon-152.png">
  <link rel="apple-touch-icon" sizes="120x120" href="icons/apple-touch-icon-120.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>내셔널짐 업무</title>

  <!-- ===========================================
       Flutter Web 부트스트랩 (3.22+ 패턴)
       구버전이면 flutter create 가 다른 코드를 넣음 → 그쪽 따를 것
       =========================================== -->
  <script src="flutter_bootstrap.js" async></script>
</head>
<body>
</body>
</html>
