<!DOCTYPE html>
<html lang="ko">
<head>
  <!--
    base href는 빌드 시 Flutter가 치환. 이 줄 유지 필수.
    상대 경로(manifest.json, icons/) 모두 이 base 기준.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <!--
    viewport-fit=cover 는 iOS PWA standalone 에서 Flutter Web 의 touch hit-test
    offset 을 유발 (URL bar 가 사라진 듯 보이지만 좌표계는 그대로). 제거.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="National Gym Workspace — 내셔널짐 PT 지점 워크스페이스">

  <!-- ===========================================
       PWA 공통
       =========================================== -->
  <meta name="theme-color" content="#0a1628">
  <link rel="manifest" href="manifest.json">

  <!-- ===========================================
       iOS 전용 (Safari 16.4+ 웹푸시 요구사항)
       반드시 "홈 화면에 추가"로 설치된 standalone 상태에서만 푸시 동작
       =========================================== -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!--
    black-translucent + viewport-fit=cover 조합이 touch offset 의 원인.
    'default' 로 변경 — 상단 상태바가 별도 영역으로 분리되어 좌표 일치.
  -->
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="NG Workspace">

  <!-- iOS 홈 화면 아이콘 (큰 사이즈가 우선됨) -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/apple-touch-icon-167.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/apple-touch-icon-152.png">
  <link rel="apple-touch-icon" sizes="120x120" href="icons/apple-touch-icon-120.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>National Gym Workspace</title>

  <!-- ===========================================
       앱 부팅 전 로딩 화면 — Flutter / CanvasKit / 한글 폰트 로드 동안
       tofu 박스 노출 차단. brand navy + gold 스피너.
       =========================================== -->
  <style>
    /* height:100% 는 iOS PWA 에서 touch 좌표 어긋남 유발 → Flutter 가 알아서 관리 */
    html, body { margin: 0; padding: 0; background: #0A1628; }
    #ng-boot {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #0A1628 0%, #1a2540 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 280ms ease, visibility 280ms ease;
    }
    #ng-boot.hide { opacity: 0; visibility: hidden; }
    #ng-boot img {
      width: 96px; height: 96px;
      filter: drop-shadow(0 4px 16px rgba(201,163,92,0.18));
      image-rendering: -webkit-optimize-contrast;
    }
    #ng-boot .spinner {
      margin-top: 32px;
      width: 28px; height: 28px;
      border: 2.5px solid rgba(201,163,92,0.18);
      border-top-color: #C9A35C;
      border-radius: 50%;
      animation: ng-spin 0.9s linear infinite;
    }
    #ng-boot .label {
      margin-top: 18px;
      color: rgba(255,255,255,0.55);
      font-size: 12px;
      letter-spacing: 2.5px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 600;
    }
    @keyframes ng-spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) {
      #ng-boot .spinner { animation: none; }
    }
  </style>

  <!-- ===========================================
       Flutter Web 부트스트랩 (3.22+ 패턴)
       =========================================== -->
  <script src="flutter_bootstrap.js" async></script>
</head>
<body>
  <div id="ng-boot" aria-label="loading">
    <img src="icons/Icon-192.png" alt="" />
    <div class="spinner" role="progressbar" aria-label="loading"></div>
    <div class="label">LOADING</div>
    <button id="ng-recover" style="display:none; margin-top:48px; padding:10px 20px;
      background:transparent; border:1px solid rgba(201,163,92,0.5); color:#C9A35C;
      border-radius:999px; font-size:12px; letter-spacing:1px; cursor:pointer;
      font-family:-apple-system, sans-serif;">
      앱이 응답하지 않을 때 — 캐시 초기화
    </button>
  </div>
  <script>
    // Flutter 첫 프레임 직후 페이드아웃. 그 전엔 tofu 노출 차단.
    var ngBooted = false;
    function ngHideBoot() {
      ngBooted = true;
      var el = document.getElementById('ng-boot');
      if (!el) return;
      el.classList.add('hide');
      setTimeout(function () { el.parentNode && el.parentNode.removeChild(el); }, 320);
    }
    window.addEventListener('flutter-first-frame', ngHideBoot);

    // 7초 안에 첫 프레임 안 뜨면 복구 버튼 표시 (PWA 먹통 방지)
    setTimeout(function () {
      if (ngBooted) return;
      var btn = document.getElementById('ng-recover');
      if (btn) btn.style.display = 'inline-block';
    }, 7000);

    // 복구 버튼: SW 등록 해제 + 모든 캐시 삭제 + 새로고침.
    // PWA 가 잘못된 캐시에 갇혔을 때 사용자가 직접 누를 수 있음.
    document.addEventListener('click', function (e) {
      if (e.target && e.target.id === 'ng-recover') {
        e.target.disabled = true;
        e.target.textContent = '초기화 중...';
        var done = Promise.resolve();
        if ('serviceWorker' in navigator) {
          done = done.then(function () {
            return navigator.serviceWorker.getRegistrations();
          }).then(function (regs) {
            return Promise.all(regs.map(function (r) { return r.unregister(); }));
          });
        }
        if ('caches' in window) {
          done = done.then(function () { return caches.keys(); })
            .then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            });
        }
        done.finally(function () {
          // 강제 리로드
          location.reload();
        });
      }
    });

    // 새 버전 자동 적용: 백그라운드에서 새 SW 가 'installed' 되면 활성화하고
    // 자동 업데이트:
    // 1. 백그라운드에서 새 SW 감지 (Flutter 가 build hash 기반으로 알아서 detect)
    // 2. 새 SW 가 'installed' 상태 되면 메시지로 skipWaiting 트리거
    //    (Flutter 의 flutter_service_worker.js 는 문자열 'skipWaiting' 을 기다림)
    // 3. controllerchange 이벤트 (= 새 SW 활성화됨) → 페이지 한 번 자동 reload
    // 4. visibility / focus 시점에 reg.update() 강제 호출 (캐시 stale 방지)
    if ('serviceWorker' in navigator) {
      // controllerchange → 새 SW 활성화됨. 사용자 입력 중 강제 reload 하면 데이터 유실.
      // 페이지가 hidden 일 때 reload 또는 사용자가 직접 '적용' 버튼 누를 때 reload.
      var ngPendingReload = false;
      function ngMaybeReload() {
        if (!window.__ngReloaded) {
          window.__ngReloaded = true;
          location.reload();
        }
      }
      function ngShowUpdatePrompt() {
        if (document.getElementById('ng-update-toast')) return;
        var t = document.createElement('div');
        t.id = 'ng-update-toast';
        t.style.cssText = 'position:fixed; bottom:16px; left:50%; transform:translateX(-50%);' +
          'background:#0A1628; color:#fff; padding:10px 16px; border-radius:999px;' +
          'box-shadow:0 4px 16px rgba(0,0,0,0.3); z-index:99999; font-size:13px;' +
          'font-family:Pretendard, -apple-system, sans-serif; display:flex; gap:12px; align-items:center;';
        t.innerHTML = '<span>새 버전이 준비됐어요</span>' +
          '<button style="background:#C9A35C; color:#0A1628; border:0; padding:6px 12px; border-radius:999px; font-weight:700; cursor:pointer; font-size:12px;">지금 적용</button>' +
          '<button style="background:transparent; color:#fff; border:0; cursor:pointer; font-size:18px; line-height:1;">×</button>';
        t.children[1].addEventListener('click', ngMaybeReload);
        t.children[2].addEventListener('click', function () { t.remove(); });
        document.body.appendChild(t);
      }
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (document.visibilityState === 'hidden') {
          ngMaybeReload();
        } else {
          ngPendingReload = true;
          ngShowUpdatePrompt();
        }
      });
      document.addEventListener('visibilitychange', function () {
        if (ngPendingReload && document.visibilityState === 'hidden') {
          ngMaybeReload();
        }
      });
      navigator.serviceWorker.ready.then(function (reg) {
        function activateIfWaiting(sw) {
          if (sw && sw.state === 'installed' && navigator.serviceWorker.controller) {
            // Flutter SW 는 message data 가 정확히 문자열 'skipWaiting' 일 때만 처리
            sw.postMessage('skipWaiting');
          }
        }
        // 이미 대기 중인 SW 있으면 즉시
        activateIfWaiting(reg.waiting);
        reg.addEventListener('updatefound', function () {
          var newSw = reg.installing;
          if (!newSw) return;
          newSw.addEventListener('statechange', function () {
            activateIfWaiting(newSw);
          });
        });
        // 앱 포어그라운드로 돌아오거나 탭 보이게 되면 새 빌드 있는지 강제 확인
        function maybeUpdate() { try { reg.update(); } catch (_) {} }
        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState === 'visible') maybeUpdate();
        });
        window.addEventListener('focus', maybeUpdate);
        // 부팅 시 한 번 더 (홈 화면에서 들어오자마자 확인)
        maybeUpdate();
      });
    }
  </script>
</body>
</html>
