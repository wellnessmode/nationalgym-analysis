<!DOCTYPE html>
<html lang="ko">
<head>
  <!--
    base href는 빌드 시 Flutter가 치환. 이 줄 유지 필수.
    상대 경로(manifest.json, icons/) 모두 이 base 기준.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="National Gym Workspace — 내셔널짐 PT 지점 워크스페이스">

  <!-- ===========================================
       PWA 공통
       =========================================== -->
  <meta name="theme-color" content="#0a1628">
  <link rel="manifest" href="manifest.json">

  <!-- ===========================================
       iOS 전용 (Safari 16.4+ 웹푸시 요구사항)
       반드시 "홈 화면에 추가"로 설치된 standalone 상태에서만 푸시 동작
       =========================================== -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NG Workspace">

  <!-- iOS 홈 화면 아이콘 (큰 사이즈가 우선됨) -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/apple-touch-icon-167.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/apple-touch-icon-152.png">
  <link rel="apple-touch-icon" sizes="120x120" href="icons/apple-touch-icon-120.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>National Gym Workspace</title>

  <!-- Pretendard 한국어 웹폰트 — tofu 박스 방지 -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
  <style>
    body, html { font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>

  <!-- ===========================================
       앱 부팅 전 로딩 화면 — Flutter / CanvasKit / 한글 폰트 로드 동안
       tofu 박스 노출 차단. brand navy + gold 스피너.
       =========================================== -->
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0A1628; }
    #ng-boot {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #0A1628 0%, #1a2540 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 280ms ease, visibility 280ms ease;
    }
    #ng-boot.hide { opacity: 0; visibility: hidden; }
    #ng-boot img {
      width: 96px; height: 96px;
      filter: drop-shadow(0 4px 16px rgba(201,163,92,0.18));
      image-rendering: -webkit-optimize-contrast;
    }
    #ng-boot .spinner {
      margin-top: 32px;
      width: 28px; height: 28px;
      border: 2.5px solid rgba(201,163,92,0.18);
      border-top-color: #C9A35C;
      border-radius: 50%;
      animation: ng-spin 0.9s linear infinite;
    }
    #ng-boot .label {
      margin-top: 18px;
      color: rgba(255,255,255,0.55);
      font-size: 12px;
      letter-spacing: 2.5px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 600;
    }
    @keyframes ng-spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) {
      #ng-boot .spinner { animation: none; }
    }
  </style>

  <!-- ===========================================
       Flutter Web 부트스트랩 (3.22+ 패턴)
       =========================================== -->
  <script src="flutter_bootstrap.js" async></script>
</head>
<body>
  <div id="ng-boot" aria-label="loading">
    <img src="icons/Icon-192.png" alt="" />
    <div class="spinner" role="progressbar" aria-label="loading"></div>
    <div class="label">LOADING</div>
    <button id="ng-recover" style="display:none; margin-top:48px; padding:10px 20px;
      background:transparent; border:1px solid rgba(201,163,92,0.5); color:#C9A35C;
      border-radius:999px; font-size:12px; letter-spacing:1px; cursor:pointer;
      font-family:-apple-system, sans-serif;">
      앱이 응답하지 않을 때 — 캐시 초기화
    </button>
  </div>
  <script>
    // Flutter 첫 프레임 직후 페이드아웃. 그 전엔 tofu 노출 차단.
    var ngBooted = false;
    function ngHideBoot() {
      ngBooted = true;
      var el = document.getElementById('ng-boot');
      if (!el) return;
      el.classList.add('hide');
      setTimeout(function () { el.parentNode && el.parentNode.removeChild(el); }, 320);
    }
    window.addEventListener('flutter-first-frame', ngHideBoot);

    // 7초 안에 첫 프레임 안 뜨면 복구 버튼 표시 (PWA 먹통 방지)
    setTimeout(function () {
      if (ngBooted) return;
      var btn = document.getElementById('ng-recover');
      if (btn) btn.style.display = 'inline-block';
    }, 7000);

    // 복구 버튼: SW 등록 해제 + 모든 캐시 삭제 + 새로고침.
    // PWA 가 잘못된 캐시에 갇혔을 때 사용자가 직접 누를 수 있음.
    document.addEventListener('click', function (e) {
      if (e.target && e.target.id === 'ng-recover') {
        e.target.disabled = true;
        e.target.textContent = '초기화 중...';
        var done = Promise.resolve();
        if ('serviceWorker' in navigator) {
          done = done.then(function () {
            return navigator.serviceWorker.getRegistrations();
          }).then(function (regs) {
            return Promise.all(regs.map(function (r) { return r.unregister(); }));
          });
        }
        if ('caches' in window) {
          done = done.then(function () { return caches.keys(); })
            .then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            });
        }
        done.finally(function () {
          // 강제 리로드
          location.reload();
        });
      }
    });
  </script>
</body>
</html>
